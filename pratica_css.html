<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Aula CSS - 1</title>
</head>
<style>
	
	*{
		font-family: 'monospace', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif, Helvetica, sans-serif;
	}
	.container {
		display: flex;
		align-items: center;
		justify-content: center;
		flex-direction: column;
	}

	.card {
		width: 500px;
		height: fit-content;
		background-color: #ffffff;
		border-radius: 15px;
		border: solid 2px #2a0061;
		margin: 20px;
		padding: 25px;
	}

	.img_card {
		width: 100px;
		height: 100px;
		border-radius: 50%;
		padding-bottom: 30px;
	}

	img {
		width: 100%;
		height: 100%;
		margin-top: 20px;
	}

	.card_text {
		padding-bottom: 10px;
	}

	.text_name {
		font-size: 30px;
	}

	.text_message {
		font-size: 15px;
	}

	.cor_destaque{
		color: #230083;	
	}

	.estilo_fonte{
		font-style: italic;
	}

	
</style>
<body>

	<div class="container">
		<div class="card">

			<div class="img_card">
				<img src="https://cdn-icons-png.flaticon.com/512/706/706830.png" alt="">
			</div>

			<div class="card_text">
				<h1 class="text_name">
					Meu nome é: <span class="cor_destaque">Adriana</span>
				</h1>

				<p class="text_message">
					Mensagem: <span class="cor_destaque estilo_fonte">A vida não é um morango! E tá tudo
						bem!</span>
				</p>
			</div>
		</div>

		<div class="card">
			<div class="img_card">
				<img src="https://cdn-icons-png.flaticon.com/256/3681/3681928.png" alt="">
			</div>

			<div class="card_text">
				<h1 class="text_name">
					Meu nome é: <span class="cor_destaque">Hugo</span>
				</h1>

				<p class="text_message">
					Mensagem: <span class="cor_destaque estilo_fonte">Um dia é da caça, o outro é do
						caçador.</span>
				</p>
			</div>
		</div>
	</div>

</body>

</html>
